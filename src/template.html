<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <script src="https://kit.fontawesome.com/00250d9010.js" crossorigin="anonymous"></script>
</head>
<body>

    <!-- Create a sidebar with several options(similar to dashboard project) -->

        <!-- Have a "my projects" section to display all projects -->
            <!-- (Add tab switching logic in one module to display tasks in that project) -->
        
        <!-- Below that we'll have ways to sort/display tasks based on input -->
        <!-- At the top we'll have an addTask button -->
        <!-- First section will be "today" to display current tasks today -->
        <!-- We'll also add a "completed" section for any tasks completed -->
        <!-- We'll have a "by date" section like "upcoming" on todoist -->

        <!-- Have a "my projects section to display current projects" -->
        <!-- Append all projects created to this section below add button -->


    <!-- Create a main section to cover rest of page -->

        <!-- In main section we will load different content based on whats clicked on sidebar -->
        <!-- Each to-do item will have a title, description, dueDate, priority, a checkBtn, editBtn, deleteBtn -->
        <!--  -->

            <header id="header">
                <h1>Welcome to To-Due</h1>
                <div id="header-options">
                    <select>
                        <option>Sort By:</option>
                        <option>Alphabetical</option>
                        <option>Due Date</option>
                        <option>Priority</option>
                    </select>
                    <button class="header-btn"><i class="fa-solid fa-bell"></i></button>
                    <button class="header-btn"><i class="fa-solid fa-gear"></i></button>
                    <button class="header-btn" id="themeSwitcher">
                        <i class="fa-solid fa-sun"></i>
                        <!-- <i class="fa-solid fa-moon"></i> -->
                    </button>
                </div>
            </header>
    
            <aside id="sidebar">

                <div id="taskSection">
                    <button class="sidebar-btn" id="addTaskBtn">
                        <i class="fa-solid fa-circle-plus"></i>
                        <span>Add task</span>
                    </button>
                    
                    <button class="sidebar-btn" id="myTasksBtn">
                        <i class="fa-solid fa-list"></i>
                        <span>My Tasks</span>
                    </button>

                    <button class="sidebar-btn" id="searchBtn">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <span>Search</span>
                    </button>

                    <button class="sidebar-btn" id="completedBtn">
                        <i class="fa-solid fa-circle-check"></i>
                        <span>Completed</span>
                    </button>
                </div>

                <div id="projectSection">
                    <div id="addProjects">
                        <h2>My Projects</h2>
                        <button class="sidebar-btn" id="addProjectBtn">
                            <i class="fa-solid fa-circle-plus"></i>
                        </button>
                    </div>
                    <div id="projectsList">
                        <!-- Projects will get appended here when created -->
                    </div>
                </div>
                
                <div id="serviceSection">
                    <button class="sidebar-btn" id="settingsBtn">
                        <i class="fa-solid fa-gear"></i> 
                        <span>Settings</span>
                    </button>
                    <button class="sidebar-btn" id="helpBtn">
                        <i class="fa-solid fa-circle-question"></i> 
                        <span>Help</span>
                    </button>
                </div>

            </aside>
    

            <main id="main">
                <!-- include default message saying no tasks + add task button -->
                <!-- Largely empty, will have content appended to it as it's created -->
            </main>


</body>
</html>
